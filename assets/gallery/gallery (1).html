<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Marin & Nava Detailing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="index.html">Marin & Nava</a>
    <nav>
      <a href="index.html#services">Services</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <section class="gallery-hero">
    <p class="eyebrow center">Our Work</p>
    <h1>Before & After Gallery</h1>
    <p>Interior, exterior, and headlight restoration results.</p>
  </section>

  <section class="section">
    <div class="gallery-grid">

      <div class="gallery-card">
        <h3>Headlight Restoration</h3>
        <div class="compare">
          <img src="assets/gallery-1.png" alt="Headlight before">
          <div class="after">
            <img src="assets/gallery-2.png" alt="Headlight after">
          </div>
          <input type="range" min="0" max="100" value="50" class="slider">
          <span class="line"></span>
        </div>
      </div>

      <div class="gallery-card">
        <h3>Exterior Detail</h3>
        <div class="compare">
          <img src="assets/gallery-3.png" alt="Exterior before">
          <div class="after">
            <img src="assets/gallery-4.png" alt="Exterior after">
          </div>
          <input type="range" min="0" max="100" value="50" class="slider">
          <span class="line"></span>
        </div>
      </div>

      <div class="gallery-card">
        <h3>Interior Detail</h3>
        <div class="compare">
          <img src="assets/gallery-5.png" alt="Interior before">
          <div class="after">
            <img src="assets/gallery-6.png" alt="Interior after">
          </div>
          <input type="range" min="0" max="100" value="50" class="slider">
          <span class="line"></span>
        </div>
      </div>

      <div class="gallery-card single">
        <h3>Interior Detail Result</h3>
        <img src="assets/gallery-7.png" alt="Interior detail result">
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
